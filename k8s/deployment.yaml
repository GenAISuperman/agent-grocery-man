apiVersion: apps/v1
kind: Deployment
metadata:
  name: "grocery-man"
  namespace: "agents-retail"
  labels:
    app: "grocery-man"
    team: "retail"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "grocery-man"
  template:
    metadata:
      labels:
        app: "grocery-man"
        team: "retail"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-grocery-man"
      containers:
        - name: "grocery-man"
          image: "acrshoppoc.azurecr.io/agents/grocery-man:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-grocery-man"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
